<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form-pane layui-tab layui-form layui-card">
    <div class="layui-card-body padding-left-40">
        <div class="layui-form-item">
            <label class="layui-form-label color-green">账号标题</label>
            <div class="layui-input-block">
                <input name="title" value="{$vo.title|default=''}" placeholder="请输入账号标题" required class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label color-green">账号名</label>
            <div class="layui-input-block">
                <input name="username" value="{$vo.username|default=''}" placeholder="请输入账号名称" required class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label color-green">注册手机</label>
            <div class="layui-input-block">
                <input name="phone_number" value="{$vo.phone_number|default=''}" placeholder="请输入注册手机" required class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label color-green">API ID</label>
            <div class="layui-input-block">
                <input name="api_id" value="{$vo.api_id|default=''}" placeholder="请输入API ID" required class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label color-green">API Hash</label>
            <div class="layui-input-block">
                <input name="api_hash" value="{$vo.api_hash|default=''}" placeholder="请输入API Hash" required class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label color-green">账号备注</label>
            <div class="layui-input-block">
                <input name="remark" value="{$vo.remark|default=''}" placeholder="请输入账号备注" class="layui-input">
            </div>
        </div>
    </div>

    <div class="hr-line-dashed"></div>
    {notempty name='vo.id'}<input type='hidden' value='{$vo.id}' name='id'>{/notempty}

    <div class="layui-form-item text-center">
        <button class="layui-btn" type='submit'>保存数据</button>
        <button class="layui-btn layui-btn-danger" type='button' data-confirm="确定要取消编辑吗？" data-close>取消编辑</button>
    </div>
</form>
